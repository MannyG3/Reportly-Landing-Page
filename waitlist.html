<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportly Waitlist</title>
<meta property="og:title" content="Join The Reportly Waitlist">
<meta property="og:description" content="Get early access to white-label agency reporting.">
<meta property="og:image" content="/og-image.svg">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Join The Reportly Waitlist">
<meta name="twitter:description" content="Get early access to white-label agency reporting.">
<meta name="twitter:image" content="/og-image.svg">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--off-black:#111110;--line:rgba(255,255,255,0.08);--muted:#a8a8a4;--white:#fff;--gold:#c9a84c;--serif:'Instrument Serif',Georgia,serif;--sans:'Geist',system-ui,sans-serif}
body{font-family:var(--sans);background:var(--black);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.wrap{width:min(760px,100%);border:1px solid var(--line);border-radius:20px;background:linear-gradient(180deg,#121210,#0f0f0e);padding:2.5rem 2rem;box-shadow:0 30px 90px rgba(0,0,0,.5)}
.back{color:var(--muted);text-decoration:none;font-size:.85rem;display:inline-flex;margin-bottom:1.25rem}
.back:hover{color:var(--white)}
h1{font-family:var(--serif);font-size:clamp(2rem,5vw,3.3rem);line-height:1.05;letter-spacing:-.02em;margin-bottom:.75rem}
p{color:var(--muted);line-height:1.7;max-width:60ch}
.badge{display:inline-block;margin:1.25rem 0 1.5rem;padding:6px 12px;border:1px solid rgba(201,168,76,.35);color:var(--gold);border-radius:999px;font-size:.75rem;letter-spacing:.04em;text-transform:uppercase}
.form-wrap{margin-top:.5rem;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#0c0c0b}
iframe{width:100%;height:620px;border:0;display:block}
.note{margin-top:.75rem;font-size:.8rem;color:var(--muted)}
@media (max-width:768px){.wrap{padding:1.5rem}iframe{height:680px}}
</style>
</head>
<body>
  <main class="wrap">
    <a class="back" href="/">← Back to home</a>
    <h1>Join the Reportly waitlist</h1>
    <p>Get early access, launch pricing, and product updates for agencies that want clean client reports without the monthly manual grind.</p>
    <span class="badge">Early access</span>
    <div class="form-wrap">
      <iframe src="https://tally.so/embed/zxeLQ0?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" title="Reportly waitlist form" loading="lazy"></iframe>
    </div>
    <p class="note">Tip: if you own a different Tally form, replace the iframe URL in waitlist.html.</p>
  </main>
</body>
</html>
